name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure sqlite3 CLI
        run: command -v sqlite3 || sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Install elan
        run: |
          curl -sSfL https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache lake build
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}

      - name: Build
        run: lake build

      - name: Unit golden tests (SQL text + params, 3 dialects)
        run: lake test

      - name: Start databases
        run: docker compose up -d --wait

      - name: Integration tests (execute against live SQLite/PostgreSQL/SQL Server)
        run: lake exe integration

      - name: Stop databases
        if: always()
        run: docker compose down -v
