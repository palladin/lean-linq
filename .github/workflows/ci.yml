name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure sqlite3 CLI + headers (native driver)
        run: |
          command -v sqlite3 || { sudo apt-get update && sudo apt-get install -y sqlite3; }
          dpkg -s libsqlite3-dev >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y libsqlite3-dev; }
          dpkg -s libpq-dev >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y libpq-dev; }
          dpkg -s freetds-dev >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y freetds-dev; }

      - name: Install elan
        run: |
          curl -sSfL https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache lake build
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean') }}

      - name: Build
        run: lake build

      - name: Unit golden tests (SQL text + params, 3 dialects)
        run: lake test

      - name: Native SQLite driver tests (typed, Values-to-Values vs the evaluator)
        run: lake exe sqlitedriver

      - name: Start databases
        run: docker compose up -d --wait

      # the driver exes exit 0 when the engine is unreachable (probe-skip, for
      # local dev) — in CI the engines must be there, so require the verdict line
      - name: Native PostgreSQL driver tests (typed, over the wire protocol)
        run: |
          lake exe pgdriver | tee pg-sweep.out
          grep -q "all green" pg-sweep.out

      - name: Native SQL Server driver tests (typed, over TDS RPC)
        run: |
          lake exe mssqldriver | tee ms-sweep.out
          grep -q "all green" ms-sweep.out

      - name: Integration tests (execute against live SQLite/PostgreSQL/SQL Server)
        run: lake exe integration

      - name: Stop databases
        if: always()
        run: docker compose down -v
